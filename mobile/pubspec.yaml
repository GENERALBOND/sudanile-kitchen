name: sudanile_kitchen
description: Sudanile Kitchen - South Sudanese Culinary Heritage App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  cached_network_image: ^3.2.3
  intl: ^0.18.1
  flutter_rating_bar: ^4.0.1
  video_player: ^2.7.0  # Add this
  infinite_scroll_pagination: ^4.0.0
  url_launcher: ^6.1.11
  image_picker: ^1.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
