{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% trans "Password Changed" %} — Sudanile Kitchen Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0ede6; color: #1a1a18; min-height: 100vh; padding: 16px; }
    .card { max-width: 560px; margin: 40px auto; background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 14px; overflow: hidden; }
    .header { padding: 20px 24px; background: #E8650A; color: white; display: flex; align-items: center; gap: 10px; }
    .body { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .icon { width: 42px; height: 42px; border-radius: 10px; background: #fff3e0; color: #E8650A; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .title { font-size: 16px; font-weight: 600; }
    .text { font-size: 13px; color: #5a5955; line-height: 1.6; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: #E8650A; color: #fff; text-decoration: none; padding: 10px 16px; border-radius: 8px; width: fit-content; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon"><i class="ti ti-lock-check"></i></div>
      <div>
        <div class="title">{% trans "Password changed successfully" %}</div>
      </div>
    </div>
    <div class="body">
      <p class="text">{% trans "Your admin password was changed successfully. You can now continue using the dashboard securely." %}</p>
      <a class="btn" href="{% url 'admin:index' %}"><i class="ti ti-arrow-left"></i> {% trans "Return to dashboard" %}</a>
    </div>
  </div>
</body>
</html>
